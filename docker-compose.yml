# Local development only. Backend hot-reloads via uvicorn; frontend via Vite.
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./backend/app:/app/app:ro
    ports:
      - "8000:8000"
    environment:
      DEBUG: "true"

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install --silent && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://localhost:8000"
    depends_on:
      - backend
